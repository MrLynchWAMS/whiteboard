<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Whiteboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide for icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #f8fafc; }
        /* Smooth transitions for UI elements */
        .ui-transition { transition: all 0.2s ease; }
    </style>
</head>
<body class="select-none text-zinc-900">

    <div class="relative w-screen h-screen overflow-hidden bg-zinc-50">
        <!-- Canvas -->
        <canvas id="canvas" class="absolute inset-0 block w-full h-full touch-none cursor-crosshair" style="touch-action: none;"></canvas>

        <!-- Main Floating Toolbar -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl p-2 border border-zinc-200 z-10">
            
            <!-- Tools -->
            <div class="flex bg-zinc-100 rounded-xl p-1 gap-1">
                <button class="tool-btn ui-transition p-2.5 rounded-lg text-zinc-500 hover:text-zinc-700 hover:bg-zinc-200/50" data-tool="pen" title="Pen">
                    <i data-lucide="pen" class="w-5 h-5 pointer-events-none"></i>
                </button>
                <button class="tool-btn ui-transition p-2.5 rounded-lg text-zinc-500 hover:text-zinc-700 hover:bg-zinc-200/50" data-tool="eraser" title="Eraser">
                    <i data-lucide="eraser" class="w-5 h-5 pointer-events-none"></i>
                </button>
                <button class="tool-btn ui-transition p-2.5 rounded-lg text-zinc-500 hover:text-zinc-700 hover:bg-zinc-200/50" data-tool="pan" title="Pan">
                    <i data-lucide="hand" class="w-5 h-5 pointer-events-none"></i>
                </button>
            </div>

            <div class="w-px h-8 bg-zinc-300 mx-1"></div>

            <!-- Colors (Dynamically injected) -->
            <div id="colors-wrapper" class="flex items-center">
                <div id="colors-container" class="flex gap-1 items-center px-1"></div>
                <div class="w-px h-8 bg-zinc-300 mx-2"></div>
            </div>

            <!-- Thickness Slider -->
            <div class="flex items-center gap-2 px-2 text-zinc-500">
                <i data-lucide="minus" class="w-4 h-4" id="icon-minus-small"></i>
                <input type="range" id="thickness-slider" min="1" max="40" value="4" class="w-24 accent-zinc-800" title="Stroke Thickness" />
                <i data-lucide="minus" class="w-5 h-5 stroke-[4px]" id="icon-minus-large"></i>
            </div>

            <div class="w-px h-8 bg-zinc-300 mx-1"></div>

            <!-- Eraser Settings -->
            <button id="erase-mode-btn" class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium text-zinc-700 hover:bg-zinc-100 ui-transition" title="Toggle Erase Mode">
                <i data-lucide="settings-2" class="w-5 h-5 pointer-events-none"></i>
                <span id="erase-mode-label">Whole Element</span>
            </button>

            <div class="w-px h-8 bg-zinc-300 mx-1"></div>

            <!-- Clear All -->
            <button id="clear-btn" class="p-2.5 rounded-xl text-red-600 hover:bg-red-50 hover:scale-105 ui-transition" title="Clear Board">
                <i data-lucide="trash-2" class="w-5 h-5 pointer-events-none"></i>
            </button>
        </div>

        <!-- Clear All Warning Modal -->
        <div id="clear-modal" class="hidden absolute inset-0 bg-zinc-900/40 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform transition-transform scale-95 opacity-0" id="clear-modal-content">
                <div class="flex items-center gap-4 text-red-600 mb-4">
                    <div class="p-3 bg-red-100 rounded-2xl">
                        <i data-lucide="alert-triangle" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-xl font-bold text-zinc-900">Clear Board?</h2>
                </div>
                <p class="text-zinc-600 mb-8 leading-relaxed">
                    This will permanently delete all strokes on the infinite canvas. This action cannot be undone.
                </p>
                <div class="flex justify-end gap-3">
                    <button id="cancel-clear-btn" class="px-5 py-2.5 rounded-xl font-medium text-zinc-700 hover:bg-zinc-100 ui-transition">
                        Cancel
                    </button>
                    <button id="confirm-clear-btn" class="px-5 py-2.5 rounded-xl font-medium bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-200 ui-transition">
                        Yes, Clear All
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Initialize Icons ---
        lucide.createIcons();

        // --- Math & Utilities ---
        function distToSegmentSquared(p, v, w) {
            const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
            if (l2 === 0) return (p.x - v.x) ** 2 + (p.y - v.y) ** 2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x))) ** 2 + (p.y - (v.y + t * (w.y - v.y))) ** 2;
        }

        const COLORS = ['#0f172a', '#dc2626', '#2563eb', '#16a34a', '#eab308'];

        // --- State ---
        const uiState = {
            tool: 'pen', // 'pen', 'eraser', 'pan'
            eraseMode: 'stroke', // 'stroke', 'partial'
            color: COLORS[0],
            thickness: 4
        };

        const canvasState = {
            strokes: [],
            currentStroke: null,
            camera: { x: 0, y: 0, z: 1 },
            isDrawing: false,
            isPanning: false,
            isErasing: false,
            lastPointerPos: null,
            activeTouches: new Map(),
            lastPinch: null,
            hasStylus: false
        };

        // --- DOM Elements ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const toolBtns = document.querySelectorAll('.tool-btn');
        const colorsContainer = document.getElementById('colors-container');
        const colorsWrapper = document.getElementById('colors-wrapper');
        const thicknessSlider = document.getElementById('thickness-slider');
        const eraseModeBtn = document.getElementById('erase-mode-btn');
        const eraseModeLabel = document.getElementById('erase-mode-label');
        
        const clearBtn = document.getElementById('clear-btn');
        const clearModal = document.getElementById('clear-modal');
        const clearModalContent = document.getElementById('clear-modal-content');
        const cancelClearBtn = document.getElementById('cancel-clear-btn');
        const confirmClearBtn = document.getElementById('confirm-clear-btn');

        // --- UI Initialization & Updates ---
        function initUI() {
            // Build Colors
            COLORS.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `color-btn w-6 h-6 rounded-full transition-all hover:scale-110`;
                btn.style.backgroundColor = c;
                btn.title = "Color";
                btn.onclick = () => { uiState.color = c; updateUI(); };
                colorsContainer.appendChild(btn);
            });

            // Tool Buttons
            toolBtns.forEach(btn => {
                btn.onclick = () => { uiState.tool = btn.dataset.tool; updateUI(); };
            });

            // Thickness
            thicknessSlider.oninput = (e) => { uiState.thickness = parseInt(e.target.value); };

            // Erase Mode
            eraseModeBtn.onclick = () => {
                uiState.eraseMode = uiState.eraseMode === 'stroke' ? 'partial' : 'stroke';
                updateUI();
            };

            // Modal Toggles
            clearBtn.onclick = () => showModal(true);
            cancelClearBtn.onclick = () => showModal(false);
            confirmClearBtn.onclick = () => {
                canvasState.strokes = [];
                showModal(false);
                redraw();
            };

            updateUI();
        }

        function updateUI() {
            // Update Tool Buttons styling
            toolBtns.forEach(btn => {
                const isActive = btn.dataset.tool === uiState.tool;
                if (isActive) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-zinc-900', 'scale-105');
                    btn.classList.remove('text-zinc-500', 'hover:bg-zinc-200/50');
                    // Add thicker icon strokes for active state
                    btn.querySelector('i').style.strokeWidth = "2.5px";
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-zinc-900', 'scale-105');
                    btn.classList.add('text-zinc-500', 'hover:bg-zinc-200/50');
                    btn.querySelector('i').style.strokeWidth = "2px";
                }
            });

            // Show/Hide Colors based on tool
            colorsWrapper.style.display = uiState.tool === 'pen' ? 'flex' : 'none';

            // Update Color Swatches
            document.querySelectorAll('.color-btn').forEach(btn => {
                // Convert inline rgb back to hex to check active (or just check colors)
                // simpler to just check index or re-assign classes
                const isActive = btn.style.backgroundColor === hexToRgb(uiState.color);
                if (isActive) {
                    btn.classList.add('scale-125', 'ring-2', 'ring-offset-2', 'ring-zinc-400');
                    btn.classList.remove('hover:scale-110');
                } else {
                    btn.classList.remove('scale-125', 'ring-2', 'ring-offset-2', 'ring-zinc-400');
                    btn.classList.add('hover:scale-110');
                }
            });

            // Update Erase Label
            eraseModeLabel.innerText = uiState.eraseMode === 'stroke' ? 'Whole Element' : 'Partial Erase';

            // Update Canvas Cursor
            canvas.className = `absolute inset-0 block w-full h-full touch-none ${
                uiState.tool === 'pan' ? 'cursor-grab active:cursor-grabbing' : 'cursor-crosshair'
            }`;
        }

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            const r = (bigint >> 16) & 255;
            const g = (bigint >> 8) & 255;
            const b = bigint & 255;
            return `rgb(${r}, ${g}, ${b})`;
        }

        function showModal(show) {
            if (show) {
                clearModal.classList.remove('hidden');
                setTimeout(() => {
                    clearModalContent.classList.remove('scale-95', 'opacity-0');
                    clearModalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                clearModalContent.classList.remove('scale-100', 'opacity-100');
                clearModalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    clearModal.classList.add('hidden');
                }, 200);
            }
        }

        // --- Core Rendering & Canvas Logic ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redraw();
        }

        function redraw() {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.scale(canvasState.camera.z, canvasState.camera.z);
            ctx.translate(-canvasState.camera.x, -canvasState.camera.y);

            const drawPath = (s) => {
                if (!s || s.points.length === 0) return;
                ctx.beginPath();
                ctx.strokeStyle = s.color;
                ctx.lineWidth = s.thickness;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                ctx.moveTo(s.points[0].x, s.points[0].y);
                for (let i = 1; i < s.points.length; i++) {
                    ctx.lineTo(s.points[i].x, s.points[i].y);
                }
                ctx.stroke();
            };

            canvasState.strokes.forEach(drawPath);
            if (canvasState.currentStroke) drawPath(canvasState.currentStroke);

            ctx.restore();
        }

        function performErase(p1, p2) {
            const R = (uiState.thickness * 4) / canvasState.camera.z; 
            let modified = false;

            if (uiState.eraseMode === 'stroke') {
                const initialCount = canvasState.strokes.length;
                canvasState.strokes = canvasState.strokes.filter(stroke => {
                    for (let i = 0; i < stroke.points.length; i++) {
                        if (distToSegmentSquared(stroke.points[i], p1, p2) < R * R) return false; 
                    }
                    return true;
                });
                if (canvasState.strokes.length !== initialCount) modified = true;
            } else {
                const newStrokes = [];
                for (const stroke of canvasState.strokes) {
                    let currentSub = [];
                    let strokeModified = false;

                    for (let i = 0; i < stroke.points.length; i++) {
                        const pt = stroke.points[i];
                        if (distToSegmentSquared(pt, p1, p2) < R * R) {
                            strokeModified = true;
                            if (currentSub.length > 0) {
                                newStrokes.push({ ...stroke, points: currentSub });
                                currentSub = [];
                            }
                        } else {
                            currentSub.push(pt);
                        }
                    }

                    if (currentSub.length > 0) {
                        if (strokeModified) newStrokes.push({ ...stroke, points: currentSub });
                        else newStrokes.push(stroke);
                    }
                    if (strokeModified) modified = true;
                }
                canvasState.strokes = newStrokes;
            }
            if (modified) redraw();
        }

        // --- Event Listeners ---
        window.addEventListener('resize', resize);

        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (e.pointerType === 'pen') canvasState.hasStylus = true;

            if (e.pointerType === 'touch') {
                canvasState.activeTouches.set(e.pointerId, { x, y });
                if (canvasState.activeTouches.size === 2) {
                    canvasState.isDrawing = false;
                    canvasState.isErasing = false;
                    canvasState.isPanning = true;
                    canvasState.currentStroke = null;
                    canvasState.lastPinch = null;
                    return;
                }
            }

            let currentAction = 'none';
            if (e.pointerType === 'touch' && canvasState.hasStylus && canvasState.activeTouches.size === 1) {
                currentAction = 'erasing';
            } else if (uiState.tool === 'pan' || e.button === 1 || (e.pointerType === 'mouse' && e.buttons === 4)) {
                currentAction = 'panning';
            } else if (uiState.tool === 'eraser') {
                currentAction = 'erasing';
            } else {
                currentAction = 'drawing';
            }

            const worldPos = {
                x: x / canvasState.camera.z + canvasState.camera.x,
                y: y / canvasState.camera.z + canvasState.camera.y
            };

            if (currentAction === 'drawing') {
                canvasState.isDrawing = true;
                canvasState.currentStroke = { color: uiState.color, thickness: uiState.thickness, points: [worldPos] };
            } else if (currentAction === 'erasing') {
                canvasState.isErasing = true;
                canvasState.lastPointerPos = worldPos;
                performErase(worldPos, worldPos);
            } else if (currentAction === 'panning') {
                canvasState.isPanning = true;
                canvasState.lastPointerPos = { x, y };
            }
            
            canvas.setPointerCapture(e.pointerId);
        });

        canvas.addEventListener('pointermove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (canvasState.activeTouches.has(e.pointerId)) {
                canvasState.activeTouches.set(e.pointerId, { x, y });
                if (canvasState.activeTouches.size === 2) {
                    const touches = Array.from(canvasState.activeTouches.values());
                    const p1 = touches[0];
                    const p2 = touches[1];
                    const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    const midpoint = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };

                    if (canvasState.lastPinch) {
                        const ratio = distance / canvasState.lastPinch.distance;
                        let newZ = canvasState.camera.z * ratio;
                        newZ = Math.max(0.05, Math.min(newZ, 50));

                        const worldMidX = canvasState.lastPinch.midpoint.x / canvasState.camera.z + canvasState.camera.x;
                        const worldMidY = canvasState.lastPinch.midpoint.y / canvasState.camera.z + canvasState.camera.y;

                        canvasState.camera.z = newZ;
                        canvasState.camera.x = worldMidX - midpoint.x / newZ;
                        canvasState.camera.y = worldMidY - midpoint.y / newZ;
                    }
                    canvasState.lastPinch = { distance, midpoint };
                    redraw();
                    return;
                }
            }

            if (canvasState.isDrawing && canvasState.currentStroke) {
                const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
                for (const ev of events) {
                    const ex = ev.clientX - rect.left;
                    const ey = ev.clientY - rect.top;
                    canvasState.currentStroke.points.push({
                        x: ex / canvasState.camera.z + canvasState.camera.x,
                        y: ey / canvasState.camera.z + canvasState.camera.y
                    });
                }
                redraw();
            } else if (canvasState.isErasing && canvasState.lastPointerPos) {
                const worldPos = {
                    x: x / canvasState.camera.z + canvasState.camera.x,
                    y: y / canvasState.camera.z + canvasState.camera.y
                };
                performErase(canvasState.lastPointerPos, worldPos);
                canvasState.lastPointerPos = worldPos;
            } else if (canvasState.isPanning && canvasState.lastPointerPos && canvasState.activeTouches.size < 2) {
                const dx = x - canvasState.lastPointerPos.x;
                const dy = y - canvasState.lastPointerPos.y;
                canvasState.camera.x -= dx / canvasState.camera.z;
                canvasState.camera.y -= dy / canvasState.camera.z;
                canvasState.lastPointerPos = { x, y };
                redraw();
            }
        });

        const handlePointerUp = (e) => {
            canvasState.activeTouches.delete(e.pointerId);

            if (canvasState.isDrawing && canvasState.currentStroke) {
                if (canvasState.currentStroke.points.length > 1) {
                    canvasState.strokes.push(canvasState.currentStroke);
                }
            }

            if (canvasState.activeTouches.size < 2) canvasState.lastPinch = null;
            if (canvasState.activeTouches.size === 0) {
                canvasState.isDrawing = false;
                canvasState.isErasing = false;
                canvasState.isPanning = false;
                canvasState.currentStroke = null;
            }
            
            canvas.releasePointerCapture(e.pointerId);
            redraw();
        };

        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.002;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const worldX = mouseX / canvasState.camera.z + canvasState.camera.x;
            const worldY = mouseY / canvasState.camera.z + canvasState.camera.y;

            const delta = e.ctrlKey ? -e.deltaY * zoomSensitivity * 2 : -e.deltaY * zoomSensitivity;
            
            let newZ = canvasState.camera.z * Math.exp(delta);
            newZ = Math.max(0.05, Math.min(newZ, 50));

            canvasState.camera.z = newZ;
            canvasState.camera.x = worldX - mouseX / newZ;
            canvasState.camera.y = worldY - mouseY / newZ;

            redraw();
        }, { passive: false });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // Run startup logic
        initUI();
        resize();
    </script>
</body>
</html>
